codecov:
  # Notify settings
  notify:
    # Require CI to pass before notifying
    require_ci_to_pass: yes
    
    # Compare against the base branch
    compare_to_base: yes
    
    # Only comment on PRs
    comment:
      layout: "reach,diff,flags,files"
      behavior: default
      require_changes: false
      require_base: no
      require_head: yes

  # Coverage collection
  coverage:
    precision: 2
    round: down
    range: "70...100"
    status:
      project:
        default:
          target: 70%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
      patch:
        default:
          target: 80%
          threshold: 0.5%
          base: auto
          if_ci_failed: error

  # Parsing configuration
  parsers:
    gcov:
      branch_detection:
        conditional: yes
        loop: yes
        method: no
        macro: no

  # Files to ignore
  ignore:
    - "tests/**"
    - "benches/**"
    - "examples/**"
    - "target/**"
    - "**/Cargo.lock"
    - "**/*.md"
    - "scripts/**"
    - ".github/**"

  # Files to include
  include:
    - "crates/**/src/**/*.rs"
    - "src/**/*.rs"

  # Comment settings
  comment:
    layout: "reach,diff,flags,files,footer"
    behavior: default
    require_changes: false
    require_base: no
    require_head: yes

  # GitHub integration
  github_checks:
    annotations: true

# Flags for different components
flags:
  kawat-xpath:
    paths:
      - crates/kawat-xpath/src/
    carryforward: true
  kawat-core:
    paths:
      - crates/kawat-core/src/
    carryforward: true
  htmldate-rs:
    paths:
      - crates/htmldate-rs/src/
    carryforward: true
