# git-cliff configuration file
# See https://github.com/orhun/git-cliff#configuration

[changelog]
# changelog header
header = """
# Changelog
All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
# changelog body - this is the template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [unreleased]
{% endif -%}
{% if previous -%}
    {% if previous.commit_id -%}
        [{{ previous.commit_id | truncate(length=7, end="") }}]({{ previous.commit_id }})
    {%- endif -%}
    {% if previous.timestamp -%}
        ... {{ previous.timestamp | date(format="%Y-%m-%d") }}
    {%- endif -%}
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking -%}
            {% raw %}**BREAKING:** {% endraw %}{{ commit.message | upper_first }}\
        {%- elif commit.scope -%}
            **{{commit.scope}}:** {{ commit.message | upper_first }}\
        {%- else -%}
            {{ commit.message | upper_first }}\
        {%- endif %}
    {% endfor %}
{% endfor %}

{% if github.contributors | filter(attribute="type", value="User") | length > 0 -%}
    ### Contributors
    {% for contributor in github.contributors | filter(attribute="type", value="User") | sort(attribute="login") -%}
        - [@{{ contributor.login }}]({{ contributor.html_url }})
    {%- endfor %}
{% endif -%}
"""
# changelog footer
footer = """
<!-- generated by git-cliff -->
"""
# remove the leading and trailing whitespace from the template
trim = true

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out commits that are not conventional
filter_unconventional = true
# process each line of a commit as an individual commit
split_commits = false
# regex for parsing the commit body
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^docs", group = "Documentation" },
    { message = "^style", group = "Styling" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^perf", group = "Performance" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore", group = "Miscellaneous Tasks" },
    { message = "^ci", group = "Continuous Integration" },
    { message = "^build", group = "Build System" },
    { body = ".*security", group = "Security" },
]
# filter out commits that are not matched by commit parsers
filter_commits = true
# regex for matching git tags
tag_pattern = "v[0-9]+.*"
# regex for skipping tags
skip_tags = "v0.1.0-beta.*"
# regex for ignoring tags
ignore_tags = ""
# sort the tags topologically
topo_order = false
# sort the tags inside the sections by date
sort_by_date = false
# limit the number of commits included in the changelog
limit_commits = 42

[bump]
# Automatically bump version based on conventional commits
auto_bump = false
# Automatically update version files
auto_update = false

[remote.github]
# GitHub owner and repository
owner = "SHA888"
repo = "kawat"
# Create GitHub releases
create_release = true
# Release title template
release_title = 'Release {{ version | trim_start_matches(pat="v") }}'
# Release body template
release_body = """
{{ changelog }}
"""
# Add release notes to the release body
release_notes = true
# Draft releases
draft = false
# Prerelease releases
prerelease = false
# Update existing releases
update_existing = true
