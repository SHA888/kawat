name: Changelog and Version

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

# Set permissions for the workflow
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Generate changelog
        id: changelog
        run: |
          # Get the most recent tag for changelog generation
          TAG=$(git describe --tags --abbrev=0)
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          # Generate changelog between tags using git log
          if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "$TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..$TAG)
            HEADER="## Changes since $PREVIOUS_TAG"
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $TAG..HEAD)
            HEADER="## Latest changes"
          fi
          
          # Create changelog
          if [ -n "$CHANGELOG" ]; then
            FULL_CHANGELOG="$HEADER\n\n$CHANGELOG"
          else
            FULL_CHANGELOG="$HEADER\n\nNo changes found."
          fi
          
          # Save to file and output
          echo "$FULL_CHANGELOG" > CHANGELOG.md
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$FULL_CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Display changelog
        run: |
          echo "=== Generated Changelog ==="
          cat CHANGELOG.md
          
      - name: Update CHANGELOG.md in repo
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update changelog"
          git push
          
      - name: Upload changelog artifact
        uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: CHANGELOG.md
          retention-days: 90

  version-bump:
    name: Version Bump
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Bump version
        id: bump
        run: |
          # Get current version from Cargo.toml
          CURRENT_VERSION=$(grep '^version' Cargo.toml | head -n1 | sed 's/version = "//; s/"//')
          
          # Simple version bump (patch version)
          BUMPED_VERSION=$(echo $CURRENT_VERSION | awk -F. '{print $1"."$2"."($3+1)}')
          
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "bumped_version=$BUMPED_VERSION" >> $GITHUB_OUTPUT
          
          echo "Current version: $CURRENT_VERSION"
          echo "Bumped version: $BUMPED_VERSION"
          
      - name: Update Cargo.toml files
        if: steps.bump.outputs.current_version != steps.bump.outputs.bumped_version
        run: |
          NEW_VERSION=${{ steps.bump.outputs.bumped_version }}
          
          # Update root Cargo.toml
          sed -i "s/^version = .*/version = \"$NEW_VERSION\"/" Cargo.toml
          
          # Update workspace crates
          find crates -name Cargo.toml -exec sed -i "s/^version = .*/version = \"$NEW_VERSION\"/" {} \;
          
          # Update dependencies
          find . -name Cargo.toml -exec sed -i "s/kawat-[^,]* = \"[^\"]*\"/kawat-\1 = \"$NEW_VERSION\"/" {} \;
          
          echo "Updated version to $NEW_VERSION"
          
      - name: Commit and tag
        if: steps.bump.outputs.current_version != steps.bump.outputs.bumped_version
        run: |
          NEW_VERSION=${{ steps.bump.outputs.bumped_version }}
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Commit version changes
          git add -A
          git commit -m "chore(release): prepare for v$NEW_VERSION"
          
          # Create tag
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          
          # Push changes and tag
          git push
          git push origin "v$NEW_VERSION"
          
      - name: Create Release
        if: steps.bump.outputs.current_version != steps.bump.outputs.bumped_version
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.bump.outputs.bumped_version }}
          release_name: Release v${{ steps.bump.outputs.bumped_version }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}
            
            ## Installation
            ```bash
            cargo install kawat --version ${{ steps.bump.outputs.bumped_version }}
            ```
          draft: false
          prerelease: false

  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Check version consistency
        run: |
          # Get the most recent tag
          if [ -n "$(git tag --sort=-version:refname | head -n1)" ]; then
            TAG_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            TAG_VERSION=${TAG_VERSION#v}  # Remove 'v' prefix
            
            # Check Cargo.toml versions
            ROOT_VERSION=$(grep '^version' Cargo.toml | head -n1 | sed 's/version = "//; s/"//')
            
            echo "Tag version: v$TAG_VERSION"
            echo "Cargo.toml version: $ROOT_VERSION"
            
            if [ "$TAG_VERSION" != "$ROOT_VERSION" ] && [ -n "$TAG_VERSION" ]; then
              echo "❌ Version mismatch!"
              echo "Tag version: v$TAG_VERSION"
              echo "Cargo.toml version: $ROOT_VERSION"
              exit 1
            else
              echo "✅ Versions match!"
            fi
          else
            echo "No tags found, skipping version validation"
          fi
