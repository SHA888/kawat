name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
          body: |
            ## Changes
            <!-- TODO: Add release notes here -->
            
            ## Installation
            ```bash
            cargo install kawat
            ```
            
            ## Downloads
            Check the assets below for pre-compiled binaries.

  build-and-upload:
    name: Build and Upload
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: kawat
            asset_name: kawat-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: kawat
            asset_name: kawat-aarch64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: kawat
            asset_name: kawat-x86_64-macos
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: kawat
            asset_name: kawat-aarch64-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: kawat.exe
            asset_name: kawat-x86_64-windows
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-
            
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
        
      - name: Create archive
        shell: bash
        run: |
          staging="kawat-${{ matrix.target }}"
          mkdir -p "$staging"
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "$staging/"
            cd "$staging"
            7z a "../${{ matrix.asset_name }}.zip" *
            cd ..
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "$staging/"
            tar czf "${{ matrix.asset_name }}.tar.gz" -C "$staging" .
          fi
          
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ matrix.os == 'windows-latest' && format('{0}.zip', matrix.asset_name) || format('{0}.tar.gz', matrix.asset_name) }}
          asset_name: ${{ matrix.os == 'windows-latest' && format('{0}.zip', matrix.asset_name) || format('{0}.tar.gz', matrix.asset_name) }}
          asset_content_type: application/octet-stream

  publish-crates:
    name: Publish to crates.io
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            
      - name: Wait for binaries to be uploaded
        run: sleep 30
        
      - name: Login to crates.io
        run: cargo login ${{ secrets.CRATES_IO_TOKEN }}
        
      - name: Publish htmldate-rs first (independent)
        run: |
          cd crates/htmldate-rs
          cargo publish --no-verify
          sleep 120  # Wait for crates.io indexing
          
      - name: Publish core dependencies
        run: |
          # Publish in dependency order
          cd crates/kawat-xpath && cargo publish --no-verify && sleep 120
          cd ../kawat-dedup && cargo publish --no-verify && sleep 120
          cd ../kawat-output && cargo publish --no-verify && sleep 120
          cd ../kawat-readability && cargo publish --no-verify && sleep 120
          cd ../kawat-justext && cargo publish --no-verify && sleep 120
          cd ../kawat-html && cargo publish --no-verify && sleep 120
          cd ../kawat-metadata && cargo publish --no-verify && sleep 120
          cd ../kawat-extract && cargo publish --no-verify && sleep 120
          cd ../kawat-core && cargo publish --no-verify && sleep 120
          
      - name: Publish kawat-cli
        run: |
          cd crates/kawat-cli
          cargo publish --no-verify
          
      - name: Publish main kawat crate
        run: cargo publish --no-verify
        
      - name: Verify published crates
        run: |
          # Check that all crates are available
          cargo search htmldate-rs --limit 1
          cargo search kawat --limit 1
