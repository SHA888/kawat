name: Release

on:
  workflow_run:
    workflows: ["Changelog and Version"]
    types:
      - completed
    branches: [main]

# Set permissions for the workflow
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Get latest tag
        id: get_tag
        run: |
          # Get the most recent tag
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $TAG"
          
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: Release ${{ steps.get_tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Changes
            <!-- TODO: Add release notes here -->
            
            ## Installation
            ### From crates.io (manual publishing)
            ```bash
            cargo install kawat
            ```
            
            ### From source
            ```bash
            cargo install --git https://github.com/SHA888/kawat.git --tag ${{ steps.get_tag.outputs.tag }}
            ```
            
            ## Downloads
            Check the assets below for pre-compiled binaries.
            
            ## Note
            Crates.io publishing is done manually to ensure quality control.

  build-and-upload:
    name: Build and Upload
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: kawat
            asset_name: kawat-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: kawat
            asset_name: kawat-aarch64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: kawat
            asset_name: kawat-x86_64-macos
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: kawat
            asset_name: kawat-aarch64-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: kawat.exe
            asset_name: kawat-x86_64-windows
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-
            
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
        
      - name: Create archive
        shell: bash
        run: |
          staging="kawat-${{ matrix.target }}"
          mkdir -p "$staging"
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "$staging/"
            cd "$staging"
            7z a "../${{ matrix.asset_name }}.zip" *
            cd ..
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "$staging/"
            tar czf "${{ matrix.asset_name }}.tar.gz" -C "$staging" .
          fi
          
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ matrix.os == 'windows-latest' && format('{0}.zip', matrix.asset_name) || format('{0}.tar.gz', matrix.asset_name) }}
          asset_name: ${{ matrix.os == 'windows-latest' && format('{0}.zip', matrix.asset_name) || format('{0}.tar.gz', matrix.asset_name) }}
          asset_content_type: application/octet-stream
